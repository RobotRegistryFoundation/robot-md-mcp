name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish to npm (requires NPM_TOKEN secret)"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      tarball: ${{ steps.pack.outputs.filename }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Pack tarball
        id: pack
        run: |
          name=$(npm pack --silent)
          echo "filename=$name" >> "$GITHUB_OUTPUT"
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            *.tgz
          if-no-files-found: error

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: artifacts/
      - name: Extract tag message
        id: tag
        run: |
          echo "message<<EOF" >> $GITHUB_OUTPUT
          git tag -l --format='%(contents)' ${{ github.ref_name }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag.outputs.message }}
          generate_release_notes: true
          files: artifacts/*.tgz

  npm-publish:
    # Manual-only. Trigger via Actions → Release → Run workflow → publish_npm=true.
    # Requires NPM_TOKEN repository secret (Automation token with publish rights).
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_npm == 'true'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required so `npm publish --provenance` can mint an OIDC attestation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
